<div class="layout">
  <app-sld-io-message></app-sld-io-message>

  <input
    #globalImportInput
    type="file"
    accept=".json,application/json"
    hidden
    (change)="onGlobalImportFileSelected($event)"
    aria-hidden="true"
    />

  <div class="layout__tabs" role="tablist" [attr.aria-label]="'nodeEditor.tablistAria' | translate">
    @for (diagram of diagrams(); track diagram) {
      <div
        class="layout__tab"
        [class.layout__tab--active]="diagram.id === activeDiagramId()"
        role="tab"
        [attr.aria-selected]="diagram.id === activeDiagramId()"
        (click)="selectDiagram(diagram.id)"
      >
        <span class="layout__tab-label">{{ diagram.name }}</span>
        @if (diagrams().length > 1) {
          <button
            mat-icon-button
            type="button"
            class="layout__tab-close"
            [attr.aria-label]="'nodeEditor.closeTabAria' | translate"
            [matTooltip]="'nodeEditor.closeTabTooltip' | translate"
            (click)="closeDiagram(diagram.id, $event)"
          >
            <mat-icon>close</mat-icon>
          </button>
        }
      </div>
    }
  </div>

  <section class="layout__workspace">
    @for (diagram of diagrams(); track trackByDiagramId($index, diagram)) {
      <app-diagram-workspace
        [diagramId]="diagram.id"
        [diagramName]="diagram.name"
        [pendingImportCells]="pendingCellsForDiagram(diagram.id)"
        (pendingImportConsumed)="onPendingImportConsumed($event)"
        (importToNewTab)="onImportToNewTab($event)"
        (saveSessionRequested)="saveAllTabsToIndexDB()"
        [class.layout__workspace-item--hidden]="diagram.id !== activeDiagramId()"
      ></app-diagram-workspace>
    }
  </section>
</div>
