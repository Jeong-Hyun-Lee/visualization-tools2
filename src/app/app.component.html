<mat-toolbar class="app-toolbar" color="transparent">
  <div class="app-toolbar__brand">
    <span class="brand">{{ diagramName() }}</span>
  </div>
  <span class="spacer"></span>
  <div class="app-toolbar__actions">
    <button
      mat-flat-button
      class="app-toolbar__action"
      type="button"
      [matMenuTriggerFor]="settingsMenu"
      [attr.aria-label]="'app.settingsAria' | translate"
      [matTooltip]="'app.settings' | translate"
    >
      <mat-icon>settings</mat-icon>
    </button>
    <mat-menu
      #settingsMenu="matMenu"
      class="app-settings-menu"
      xPosition="before"
    >
      <button
        mat-menu-item
        disabled
        type="button"
        class="app-settings-menu__heading"
      >
        {{ "app.theme" | translate }}
      </button>
      <button mat-menu-item type="button" (click)="onThemeSelect('light')">
        <mat-icon
          [style.visibility]="theme() === 'light' ? 'visible' : 'hidden'"
        >
          check
        </mat-icon>
        <span>{{ "app.light" | translate }}</span>
      </button>
      <button mat-menu-item type="button" (click)="onThemeSelect('dark')">
        <mat-icon
          [style.visibility]="theme() === 'dark' ? 'visible' : 'hidden'"
        >
          check
        </mat-icon>
        <span>{{ "app.dark" | translate }}</span>
      </button>
      <mat-divider></mat-divider>
      <button
        mat-menu-item
        disabled
        type="button"
        class="app-settings-menu__heading"
      >
        {{ "app.language" | translate }}
      </button>
      <button mat-menu-item type="button" (click)="onLanguageSelect('ko')">
        <mat-icon
          [style.visibility]="language() === 'ko' ? 'visible' : 'hidden'"
        >
          check
        </mat-icon>
        <span>{{ "app.korean" | translate }}</span>
      </button>
      <button mat-menu-item type="button" (click)="onLanguageSelect('en')">
        <mat-icon
          [style.visibility]="language() === 'en' ? 'visible' : 'hidden'"
        >
          check
        </mat-icon>
        <span>{{ "app.english" | translate }}</span>
      </button>
    </mat-menu>
  </div>
</mat-toolbar>

<div class="app-pagebar">
  <button
    type="button"
    class="app-pagebar__icon-btn"
    aria-label="새 다이어그램 추가"
    (click)="onAddPage()"
  >
    <mat-icon>add</mat-icon>
  </button>
  <div class="app-pagebar__tabs">
    <mat-tab-group
      [selectedIndex]="activePageIndex()"
      (selectedIndexChange)="onSelectPage($event)"
      animationDuration="0ms"
      mat-stretch-tabs="false"
      class="app-pagebar__tab-group"
    >
      @for (page of pages(); track page.id; let idx = $index) {
        <mat-tab>
          <ng-template mat-tab-label>
            <mat-chip-grid aria-label="다이어그램 탭">
              <mat-chip-row
                class="app-pagebar__chip-row"
                [removable]="idx > 0"
                (removed)="onClosePage(idx, $event)"
              >
                <span class="app-pagebar__chip-label">{{ page.name }}</span>
                @if (idx > 0) {
                  <button
                    matChipRemove
                    type="button"
                    class="app-pagebar__chip-close-btn"
                    [attr.aria-label]="page.name + ' 탭 닫기'"
                  >
                    <mat-icon class="app-pagebar__chip-close" aria-hidden="true"
                      >close</mat-icon
                    >
                  </button>
                }
              </mat-chip-row>
            </mat-chip-grid>
          </ng-template>
        </mat-tab>
      }
    </mat-tab-group>
  </div>
</div>

<main>
  <router-outlet></router-outlet>
</main>
