<div class="app-layout">
  <header class="app-chrome">
    <div class="app-chrome__top">
      <div class="app-chrome__brand">
        <div class="app-chrome__titles">
          <span class="app-chrome__eyebrow">Node Editor</span>
          <h1 class="app-chrome__title">{{ diagramName() }}</h1>
        </div>
      </div>
      <div class="app-chrome__tools">
        <p-button
          type="button"
          icon="pi pi-cog"
          [rounded]="true"
          [text]="true"
          severity="secondary"
          styleClass="app-chrome__icon-btn"
          (onClick)="settingsMenu.toggle($event)"
          [attr.aria-label]="'app.settingsAria' | translate"
          [pTooltip]="'app.settings' | translate"
          tooltipPosition="bottom"
        />
        <p-menu
          #settingsMenu
          [model]="settingsMenuItems()"
          [popup]="true"
          [appendTo]="'body'"
          styleClass="app-settings-menu"
        />
      </div>
    </div>

    <p-divider layout="horizontal" styleClass="app-chrome__divider" />

    <div class="app-chrome__tabs-row">
      <p-button
        type="button"
        icon="pi pi-plus"
        [rounded]="true"
        severity="primary"
        styleClass="app-chrome__add-tab"
        (onClick)="onAddPage()"
        [attr.aria-label]="'새 다이어그램 추가'"
        pTooltip="새 다이어그램"
        tooltipPosition="bottom"
      />
      <div class="app-chrome__tabs-wrap">
        <p-tabs
          class="app-pagebar__tab-group"
          [value]="activePageIndex()"
          (valueChange)="onSelectPage($event)"
          [scrollable]="true"
          [lazy]="true"
        >
          <p-tablist>
            @for (page of pages(); track page.id; let idx = $index) {
              <p-tab [value]="idx">
                <span class="app-pagebar__tab-label">{{ page.name }}</span>
                @if (idx > 0) {
                  <button
                    type="button"
                    class="app-pagebar__tab-close-btn"
                    (click)="onClosePage(idx, $event)"
                    [attr.aria-label]="page.name + ' 탭 닫기'"
                  >
                    <i class="pi pi-times app-pagebar__tab-close" aria-hidden="true"></i>
                  </button>
                }
              </p-tab>
            }
          </p-tablist>
          <p-tabpanels class="app-pagebar__tab-panels">
            @for (page of pages(); track page.id; let idx = $index) {
              <p-tabpanel [value]="idx" [lazy]="true"></p-tabpanel>
            }
          </p-tabpanels>
        </p-tabs>
      </div>
    </div>
  </header>

  <main class="app-main">
    <router-outlet></router-outlet>
  </main>
</div>
