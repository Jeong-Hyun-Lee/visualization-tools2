<div class="app-layout">
  <p-toast key="save-toast" position="top-center" />
  <header class="app-chrome">
    <div class="app-chrome__top">
      <div class="app-chrome__brand">
        <div class="app-chrome__mark" aria-hidden="true">
          <i class="pi pi-sitemap"></i>
        </div>
        <div class="app-chrome__titles">
          <span class="app-chrome__eyebrow">{{ 'app.brandChip' | translate }}</span>
          <h1 class="app-chrome__title">{{ diagramName() }}</h1>
        </div>
      </div>
      <div class="app-chrome__tools">
        <p-button
          type="button"
          [icon]="themeToggleIcon()"
          [rounded]="true"
          [text]="true"
          severity="secondary"
          styleClass="app-chrome__icon-btn"
          (onClick)="onToggleTheme()"
          [attr.aria-label]="themeToggleTooltip()"
          [pTooltip]="themeToggleTooltip()"
          tooltipPosition="bottom"
        />
        <p-button
          type="button"
          icon="pi pi-language"
          [rounded]="true"
          [text]="true"
          severity="secondary"
          styleClass="app-chrome__icon-btn"
          (onClick)="settingsMenu.toggle($event)"
          [attr.aria-label]="'app.settingsAria' | translate"
          [pTooltip]="'app.settings' | translate"
          tooltipPosition="bottom"
        />
        <p-menu
          #settingsMenu
          [model]="settingsMenuItems()"
          [popup]="true"
          [appendTo]="'body'"
          styleClass="app-settings-menu"
        />
      </div>
    </div>

    <p-divider layout="horizontal" styleClass="app-chrome__divider" />

  </header>

  <main class="app-main">
    <div class="app-main__tabbar">
      <p-tabs
        class="app-pagebar__tab-group"
        [value]="activePageIndex()"
        (valueChange)="onSelectPage($event)"
        [scrollable]="true"
        [lazy]="true"
      >
        <p-tablist>
          @for (page of pages(); track page.id; let idx = $index) {
            <p-tab [value]="idx">
              <span class="app-pagebar__tab-label">{{ page.name }}</span>
              @if (idx > 0) {
                <button
                  type="button"
                  class="app-pagebar__tab-close-btn"
                  (click)="onClosePage(idx, $event)"
                  [attr.aria-label]="('nodeEditor.closeTabAria' | translate) + ': ' + page.name"
                >
                  <i class="pi pi-times app-pagebar__tab-close" aria-hidden="true"></i>
                </button>
              }
            </p-tab>
          }
          <p-tab
            [value]="-1"
            class="app-pagebar__tab app-pagebar__tab--add"
            [pTooltip]="'app.newDiagramTooltip' | translate"
            tooltipPosition="bottom"
            [attr.aria-label]="'app.newDiagram' | translate"
          >
            <i class="pi pi-plus" aria-hidden="true"></i>
          </p-tab>
        </p-tablist>
        <p-tabpanels class="app-pagebar__tab-panels">
          @for (page of pages(); track page.id; let idx = $index) {
            <p-tabpanel [value]="idx" [lazy]="true">
              <app-workspace [storageKey]="page.storageKey" />
            </p-tabpanel>
          }
        </p-tabpanels>
      </p-tabs>
    </div>
  </main>
</div>
