@if (io.state(); as state) {
  <p-message
    class="sld-io-message"
    [severity]="state.variant === 'error' ? 'error' : 'success'"
    [icon]="state.variant === 'error' ? 'pi pi-times-circle' : 'pi pi-check-circle'"
    variant="simple"
    [attr.role]="state.variant === 'error' ? 'alert' : 'status'"
  >
    {{ state.text }}
  </p-message>
}
