<div class="workspace" [class.workspace--space-panning]="isPanActive()">
  <p-card
    [header]="'workspace.shapes' | translate"
    [subheader]="'workspace.dragOntoCanvas' | translate"
    styleClass="workspace__card workspace__card--palette"
  >
    <div class="workspace__palette-scroll">
      <div class="workspace__palette-list">
        @for (paletteItem of paletteModel(); track paletteTrackBy(paletteItem, $index)) {
          <ng-diagram-palette-item [item]="paletteItem" class="workspace__palette-host">
            <div class="workspace__palette-item">
              <span class="workspace__palette-item-icon" aria-hidden="true">
                <i [class]="paletteItemIcon(paletteItem)"></i>
              </span>
              <span class="workspace__palette-item-label">{{ paletteItem.data['label'] }}</span>
            </div>
            <ng-diagram-palette-item-preview>
              <div class="workspace__palette-item workspace__palette-item--preview">
                <span class="workspace__palette-item-icon" aria-hidden="true">
                  <i [class]="paletteItemIcon(paletteItem)"></i>
                </span>
                <span class="workspace__palette-item-label">{{ paletteItem.data['label'] }}</span>
              </div>
            </ng-diagram-palette-item-preview>
          </ng-diagram-palette-item>
        }
      </div>
    </div>
  </p-card>

  <section class="workspace__center">
    <p-toolbar styleClass="workspace__toolbar">
      <ng-template pTemplate="start">
        <div class="workspace__toolbar-heading">
          <span class="workspace__toolbar-title">{{ 'workspace.canvas' | translate }}</span>
          <span class="workspace__toolbar-hint">{{ 'workspace.spaceDragPan' | translate }}</span>
        </div>
      </ng-template>
      <ng-template pTemplate="end">
        <div class="workspace__toolbar-actions">
          <p-button
            type="button"
            icon="pi pi-undo"
            size="small"
            styleClass="workspace__mode-btn workspace__history-btn"
            severity="secondary"
            [outlined]="true"
            [disabled]="!canUndo()"
            (onClick)="onUndo()"
            [pTooltip]="'workspace.undoTooltip' | translate"
            tooltipPosition="top"
            [attr.aria-label]="'workspace.undo' | translate"
          />
          <p-button
            type="button"
            icon="pi pi-replay"
            size="small"
            styleClass="workspace__mode-btn workspace__history-btn workspace__history-btn--redo"
            severity="secondary"
            [outlined]="true"
            [disabled]="!canRedo()"
            (onClick)="onRedo()"
            [pTooltip]="'workspace.redoTooltip' | translate"
            tooltipPosition="top"
            [attr.aria-label]="'workspace.redo' | translate"
          />
          <p-divider layout="vertical" styleClass="workspace__toolbar-divider" />
          <p-button
            type="button"
            size="small"
            styleClass="workspace__mode-btn workspace__mode-btn--select"
            [outlined]="interactionMode() !== 'select'"
            [severity]="interactionMode() === 'select' ? 'primary' : 'secondary'"
            (onClick)="setInteractionMode('select')"
            [pTooltip]="'workspace.select' | translate"
            tooltipPosition="top"
            [attr.aria-label]="'workspace.select' | translate"
          >
            <span class="material-symbols-outlined workspace__mode-material-icon" aria-hidden="true"
              >arrow_selector_tool</span
            >
          </p-button>
          <p-button
            type="button"
            icon="pi pi-arrows-alt"
            size="small"
            styleClass="workspace__mode-btn"
            [outlined]="interactionMode() !== 'pan'"
            [severity]="interactionMode() === 'pan' ? 'primary' : 'secondary'"
            (onClick)="setInteractionMode('pan')"
            [pTooltip]="'workspace.hand' | translate"
            tooltipPosition="top"
            [attr.aria-label]="'workspace.hand' | translate"
          />
        </div>
      </ng-template>
    </p-toolbar>

    <div class="workspace__canvas not-content">
      <ng-diagram [model]="model" [config]="config" class="diagram">
        <ng-diagram-background />
      </ng-diagram>
    </div>
  </section>

  <p-card
    [header]="'workspace.properties' | translate"
    [subheader]="'workspace.selection' | translate"
    styleClass="workspace__card workspace__card--sidebar"
  >
    <div class="workspace__form">
      <label class="workspace__field-label" for="prop-node-id">{{ 'workspace.nodeId' | translate }}</label>
      <input
        id="prop-node-id"
        pInputText
        [fluid]="true"
        [value]="selectedNodeId()"
        readonly
      />

      <label class="workspace__field-label" for="prop-label">{{ 'workspace.label' | translate }}</label>
      <input
        id="prop-label"
        pInputText
        [fluid]="true"
        [value]="selectedNodeLabel()"
        readonly
      />

      <label class="workspace__field-label" for="prop-type">{{ 'workspace.type' | translate }}</label>
      <p-select
        inputId="prop-type"
        styleClass="workspace__select"
        [options]="typeOptions()"
        [(ngModel)]="mockType"
        optionLabel="label"
        optionValue="value"
        [disabled]="true"
        [placeholder]="'workspace.type' | translate"
      />

      <p-divider styleClass="workspace__form-divider" />

      <span class="workspace__field-label">{{ 'workspace.status' | translate }}</span>
      <div class="workspace__tags">
        <p-tag [value]="'workspace.resizable' | translate" severity="secondary" [rounded]="true" />
        <p-tag [value]="'workspace.rotatable' | translate" severity="secondary" [rounded]="true" />
      </div>
    </div>
  </p-card>
</div>
